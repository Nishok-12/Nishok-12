name: Update TryHackMe Badge

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-thm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update timestamp (force refresh)
        run: |
          echo "Updating README to refresh TryHackMe badge..."
          DATE=$(date)
          sed -i "s/<!-- THM-UPDATE -->.*/<!-- THM-UPDATE --> $DATE/g" README.md || echo "<!-- THM-UPDATE --> $DATE" >> README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "Nishok"
          git config --global user.email "nishok@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 Update TryHackMe badge timestamp" || echo "No changes to commit"
          git push
